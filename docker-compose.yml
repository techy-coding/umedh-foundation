version: '3.8'
services:
  db:
    image: postgres:16
    container_name: umedh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: umedh_foundation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: web-weaver-app
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password@db:5432/umedh_foundation
    depends_on:
      - db
    volumes:
      - ./:/app:cached
      - /app/node_modules
    restart: unless-stopped

volumes:
  db_data:
